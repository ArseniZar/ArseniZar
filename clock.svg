<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 410 410" xmlns="http://www.w3.org/2000/svg">
    <style>
        svg {
  width: 100%;
  height: 100%;
  display: block;
  overflow: visible;
}
.face {
  transform-origin: center;
  transform: rotate(-90deg);
  fill: none;
  stroke: #c9851e;
  stroke-width: 4;
  stroke-dasharray: 1200;
  stroke-dashoffset: 1200;
  animation: drawOutline 5s ease-out forwards;
  filter: drop-shadow(0 0 8px #ffa502);
}
.line {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: opacity-transform-effect 0.1s ease-out forwards;
}
#hour-line {
  stroke: #ff4757;
  stroke-width: 2;
  filter: drop-shadow(0 0 2px #ff4757);
}
#second-line {
  stroke: #fff;
  stroke-width: 2;
  filter: drop-shadow(0 0 2px #fff);
}
.center-clock {
  opacity: 0;
  fill: #fff;
  transform-origin: center;
  animation: opacity-transform-effect 2s ease-out forwards;
}
.hand {
  opacity: 0;
  stroke-linecap: round;
  transform-origin: 205px 205px;
}
#hour-hand {
  stroke: #ff4757;
  stroke-width: 6;
  animation: opacity-effect 5s ease-out forwards, rotateHand 43200s linear infinite;
}
#minute-hand {
  stroke: #fff;
  stroke-width: 4;
  animation: opacity-effect 5s ease-out forwards, rotateHand 3600s linear infinite;
}
#second-hand {
  stroke: #ffa502;
  stroke-width: 2;
  animation: opacity-effect 5s ease-out forwards, rotateHand 60s steps(60) infinite;
}
.point {
  opacity: 0;
  transform-origin: center;
  transform-box: fill-box;
  animation: point-effect 0.1s ease-out forwards;
  filter: drop-shadow(0 0 2px #00f2ff);
}
@-moz-keyframes opacity-transform-effect {
  0% {
    opacity: 0;
    transform: scale(0);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
@-webkit-keyframes opacity-transform-effect {
  0% {
    opacity: 0;
    transform: scale(0);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
@-o-keyframes opacity-transform-effect {
  0% {
    opacity: 0;
    transform: scale(0);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
@keyframes opacity-transform-effect {
  0% {
    opacity: 0;
    transform: scale(0);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}
@-moz-keyframes opacity-effect {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 1;
  }
}
@-webkit-keyframes opacity-effect {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 1;
  }
}
@-o-keyframes opacity-effect {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 1;
  }
}
@keyframes opacity-effect {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 1;
  }
}
@-moz-keyframes drawOutline {
  to {
    stroke-dashoffset: 0;
  }
}
@-webkit-keyframes drawOutline {
  to {
    stroke-dashoffset: 0;
  }
}
@-o-keyframes drawOutline {
  to {
    stroke-dashoffset: 0;
  }
}
@keyframes drawOutline {
  to {
    stroke-dashoffset: 0;
  }
}
@-moz-keyframes rotateHand {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
@-webkit-keyframes rotateHand {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
@-o-keyframes rotateHand {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}
@keyframes rotateHand {
  from {
    transform: rotate(0deg);
  }
  to {
    transform: rotate(360deg);
  }
}


    </style>
